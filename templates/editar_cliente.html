<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar cliente</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:"Segoe UI", Arial, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:radial-gradient(circle at top left,#1e293b 0%,#0f172a 35%,#020617 100%);
            color:#e2e8f0;
            padding:30px;
        }

        .box{
            width:100%;
            max-width:900px;
            background:rgba(15,23,42,0.85);
            border:1px solid rgba(148,163,184,0.12);
            border-radius:22px;
            padding:28px;
            box-shadow:0 18px 40px rgba(0,0,0,0.25);
        }

        h1{
            margin-bottom:8px;
            color:#fff;
        }

        p{
            margin-bottom:20px;
            color:#94a3b8;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:14px;
        }

        .full{
            grid-column:1 / -1;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:600;
            color:#cbd5e1;
        }

        input, select, textarea{
            width:100%;
            padding:13px;
            border-radius:14px;
            border:1px solid rgba(148,163,184,0.15);
            background:rgba(255,255,255,0.04);
            color:#fff;
            outline:none;
        }

        input::placeholder,
        textarea::placeholder{
            color:#94a3b8;
        }

        select option{
            color:#000;
        }

        .actions{
            margin-top:20px;
            display:flex;
            gap:10px;
            flex-wrap:wrap;
        }

        .btn{
            text-decoration:none;
            padding:12px 16px;
            border:none;
            border-radius:14px;
            color:#fff;
            font-weight:700;
            cursor:pointer;
            display:inline-block;
        }

        .btn-save{
            background:linear-gradient(135deg,#2563eb,#1d4ed8);
        }

        .btn-back{
            background:linear-gradient(135deg,#475569,#334155);
        }
    </style>

    <script>
        function formatarCPF(campo){
            let valor = campo.value.replace(/\D/g,'');

            if(valor.length > 11){
                valor = valor.slice(0,11);
            }

            valor = valor.replace(/^(\d{3})(\d)/,'$1.$2');
            valor = valor.replace(/^(\d{3})\.(\d{3})(\d)/,'$1.$2.$3');
            valor = valor.replace(/\.(\d{3})(\d)/,'.$1-$2');

            campo.value = valor;
        }
    </script>
</head>
<body>

<div class="box">
    <h1>Editar cliente</h1>
    <p>Atualize os dados do cliente abaixo.</p>

    <form method="POST">
        <div class="grid">
            <div>
                <label>Nome</label>
                <input type="text" name="nome" value="{{ cliente[1] }}">
            </div>

            <div>
                <label>CPF</label>
                <input type="text" name="cpf" value="{{ cliente[2] }}" maxlength="14" onkeyup="formatarCPF(this)">
            </div>

            <div>
                <label>Data de nascimento</label>
                <input type="date" name="nascimento" value="{{ cliente[3] }}">
            </div>

            <div>
                <label>Telefone</label>
                <input type="text" name="telefone" value="{{ cliente[4] }}">
            </div>

            <div>
                <label>E-mail</label>
                <input type="email" name="email" value="{{ cliente[5] }}">
            </div>

            <div>
                <label>Status</label>
                <select name="status">
                    <option value="Ativo" {% if cliente[6] == "Ativo" %}selected{% endif %}>Ativo</option>
                    <option value="Inativo" {% if cliente[6] == "Inativo" %}selected{% endif %}>Inativo</option>
                    <option value="Pendente" {% if cliente[6] == "Pendente" %}selected{% endif %}>Pendente</option>
                </select>
            </div>

            <div class="full">
                <label>Nova senha do cliente</label>
                <input type="password" name="senha_cliente" placeholder="Preencha só se quiser trocar a senha">
            </div>

            <div class="full">
                <label>Observações</label>
                <textarea name="observacoes" rows="4">{{ cliente[7] }}</textarea>
            </div>
        </div>

        <div class="actions">
            <button type="submit" class="btn btn-save">Salvar alterações</button>
            <a href="/dashboard" class="btn btn-back">Voltar</a>
        </div>
    </form>
</div>

</body>
</html>
